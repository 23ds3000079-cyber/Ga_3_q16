name: IMDb Movie Scraper - 23ds3000079

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python - 23ds3000079@ds.study.iitm.ac.in
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run IMDb scraper
        run: python imdb_scraper.py
        
      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        with:
          name: imdb-movies-json
          path: imdb_movies.json
          
      - name: Upload text results
        uses: actions/upload-artifact@v4
        with:
          name: imdb-results-txt
          path: results.txt
          
      - name: Display results in summary
        if: always()
        run: |
          echo "## 🎬 IMDb Movie Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated by:** 23ds3000079@ds.study.iitm.ac.in" >> $GITHUB_STEP_SUMMARY
          echo "**Rating Range:** 3.0 - 5.0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f imdb_movies.json ]; then
            MOVIE_COUNT=$(python -c "import json; print(len(json.load(open('imdb_movies.json'))))")
            echo "**Movies Found:** $MOVIE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat imdb_movies.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No results found" >> $GITHUB_STEP_SUMMARY
          fi
